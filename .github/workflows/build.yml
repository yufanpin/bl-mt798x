name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu build-essential flex bison libssl-dev device-tree-compiler

      - name: Build all boards
        run: |
          set -e
          mkdir -p output

          # mt7981 default only
          for board in \
            360t7 abt_asr3000 cetron_ct3003 cmcc_a10 cmcc_rax3000m \
            cmcc_rax3000m-emmc cmcc_xr30 cmcc_xr30-emmc \
            glinet_gl-mt2500 glinet_gl-mt3000 h3c_magic-nx30-pro \
            imou_lc-hx3001 jcg_q30 konka_komi-a31 livinet_zr-3020 \
            nokia_ea0326gmp openembed_som7981; do
            echo "=== Building mt7981 $board ==="
            SOC=mt7981 BOARD=$board ./build.sh || echo "WARN: mt7981 $board failed"
          done

          # mt7981 default + multi-layout
          for board in ax3000t clt_r30b1 honor_fur-602 newland_nl-wr8103 \
            newland_nl-wr9103 ruijie_rg_x30e ruijie_rg_x30e_pro wr30u; do
            echo "=== Building mt7981 $board (default) ==="
            SOC=mt7981 BOARD=$board MULTI_LAYOUT=0 ./build.sh || echo "WARN: mt7981 $board default failed"
            echo "=== Building mt7981 $board (multi-layout) ==="
            SOC=mt7981 BOARD=$board MULTI_LAYOUT=1 ./build.sh || echo "WARN: mt7981 $board multi-layout failed"
          done

          # mt7986 default only
          for board in \
            bpi_r3-emmc bpi_r3mini-emmc bpi_r3-nor bpi_r3-sd \
            glinet_gl-mt6000 jdcloud_re-cp-03 tplink_tl-xdr608x \
            tplink_tl-xtr8488 zyxel_ex5700; do
            echo "=== Building mt7986 $board ==="
            SOC=mt7986 BOARD=$board ./build.sh || echo "WARN: mt7986 $board failed"
          done

          # mt7986 default + multi-layout
          for board in bpi_r3mini-snand bpi_r3-snand redmi_ax6000 ruijie_rg-x60-pro; do
            echo "=== Building mt7986 $board (default) ==="
            SOC=mt7986 BOARD=$board MULTI_LAYOUT=0 ./build.sh || echo "WARN: mt7986 $board default failed"
            echo "=== Building mt7986 $board (multi-layout) ==="
            SOC=mt7986 BOARD=$board MULTI_LAYOUT=1 ./build.sh || echo "WARN: mt7986 $board multi-layout failed"
          done

      - name: Stage firmware
        run: |
          mkdir -p staged
          cp output/*.bin staged/ 2>/dev/null || true
          echo "Built files:"
          ls -la staged/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: staged/*.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Firmware ${{ github.sha }}
          body: |
            Auto-built firmware from commit ${{ github.sha }}
            Date: ${{ github.event.repository.updated_at }}
          files: staged/*.bin
          fail_on_unmatched_files: false
